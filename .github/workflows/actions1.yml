name: CI for staging 

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy (leave empty to use the current branch)'
        required: false
        type: string
        default: ''
  push:
    branches:
      - 'release/*'
      - 'feature/*'

permissions:
  contents: read
  actions: write

jobs:
  deploy:
    # Since we removed the environment input, we default to 'staging' for pushes 
    # and you can either hardcode 'staging' or keep logic if needed.
    name: Deploy to staging
    runs-on: [self-hosted, decathlon]
    environment: staging
    timeout-minutes: 60
    
    # Logic: Run on any manual trigger OR any push to the filtered branches defined above
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    
    steps:
      - name: Pre/Post Clean Action
        uses: dktunited/.github/actions/cleaner@main

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
          fetch-depth: 0

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.21.1

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      # - name: Deploy to staging
      #   run: npm run deploy:staging
      #   env:
      #     NODE_ENV: staging

      - name: Track deployed branch for staging
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            DEPLOYED_BRANCH="${{ github.ref_name }}"
          elif [ -n "${{ github.event.inputs.branch }}" ]; then
            DEPLOYED_BRANCH="${{ github.event.inputs.branch }}"
          else
            DEPLOYED_BRANCH="${{ github.ref_name }}"
          fi

          PAYLOAD=$(jq -n --arg val "$DEPLOYED_BRANCH" '{"name":"STAGING_DEPLOYED_BRANCH","value":$val}')

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PATCH \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/variables/STAGING_DEPLOYED_BRANCH" \
            -d "$PAYLOAD")

          if [ "$HTTP_STATUS" = "404" ]; then
            curl -s -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/variables" \
              -d "$PAYLOAD"
          fi

          echo "STAGING_DEPLOYED_BRANCH set to: $DEPLOYED_BRANCH"
